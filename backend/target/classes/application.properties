# ===========================================
# BASE Configuration
# Supports both Local and Railway deployment
# ===========================================

server.port=${PORT:8080}
spring.application.name=mahathi-contractor-api

# Admin Email
mahathi.admin.email=mahathicontractors@gmail.com

# ===========================================
# EMAIL CONFIGURATION
# ===========================================
# Set to true to enable email
mahathi.email.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mahathicontractors@gmail.com
mahathi.email=true
spring.mail.password=jqomckwzgcsnmbrm
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===========================================
# DATABASE CONFIGURATION
# For Railway: Set DB_HOST, DB_PORT, etc. as environment variables
# For Local: Uses defaults below (localhost)
# ===========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mahathi_contractor}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Tanush098.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS - Allow all origins (update for production)
spring.mvc.cors.allowed-origins=${CORS_ORIGINS:*}

# Logging
logging.level.com.mahathi.contractor=INFO
logging.level.org.springframework.web=WARN
