# Production Configuration
# Copy this file to application.properties or set as environment variables

# Database - SET THESE
spring.datasource.url=jdbc:mysql://YOUR_HOST:3306/mahathi_contractor
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD

# Email - SET THESE
mahathi.email.enabled=true
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD

# Production Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Disable debug logging
logging.level.com.mahathi.contractor=WARN
logging.level.org.springframework.web=WARN
