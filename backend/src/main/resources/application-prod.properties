# ===========================================
# PRODUCTION Configuration for Railway
# ===========================================

server.port=${PORT:8080}
spring.application.name=mahathi-contractor-api

# Admin Email
mahathi.admin.email=${ADMIN_EMAIL:mahathicontractor@gmail.com}

# ===========================================
# EMAIL CONFIGURATION
# ===========================================
mahathi.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===========================================
# DATABASE CONFIGURATION - Railway MySQL
# ===========================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:mahathi_contractor}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings for Production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Disable multipart for now
spring.servlet.multipart.enabled=false

# CORS - Update with your frontend URL in production
spring.mvc.cors.allowed-origins=${CORS_ORIGINS:*}

# Security - Disable in dev, enable actuator in prod
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Logging - Production
logging.level.com.mahathi.contractor=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
